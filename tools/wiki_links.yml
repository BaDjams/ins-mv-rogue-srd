  - terms: ["riposte"]
    target: "combat.md"

  # ── Pouvoirs ─────────────────────────────────────────────────────────────────
  - terms: ["résilience"]
    target: "blessures.md"

  # ── Blessures ────────────────────────────────────────────────────────────────
  - terms: ["points de vie"]
    target: "blessures.md"

  # ── Réincarnation ────────────────────────────────────────────────────────────
  - terms: ["réincarnation", "se réincarner", "réincarne"]
