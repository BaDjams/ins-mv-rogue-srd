site_name: INS-MV ROGUE — SRD
site_url: https://BaDjams.github.io/ins-mv-rogue-srd/
site_description: System Reference Document pour INS-MV ROGUE

theme:
  name: material
  custom_dir: overrides
  language: fr
  palette:
    scheme: slate
    primary: deep orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/rogue-srd.css

extra_javascript:
  - javascripts/rogue-srd.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list

nav:
  - Accueil: index.md
  - SRD:
    - srd.md
    - Contexte:
      - Le monde du jeu: contexte.md
    - Personnage:
      - Caractéristiques & attributs: caracteristiques.md
      - Création d'âme: creation.md
      - Rang céleste: rang.md
      - Progression: progression.md
      - Réincarnation: reincarnation.md
    - Mécanique:
      - Résolution D666: resolution.md
      - Combat & initiative: combat.md
      - Pouvoirs: pouvoirs.md
      - Compétences: competences.md
      - Énergie: energie.md
      - Blessures: blessures.md
    - Référence:
      - Mots-clés: mots-cles.md
      - États: etats.md
      - Équipement:
        - equipement.md
        - Armes de mêlée: equipement-melee.md
        - Armes à feu: equipement-armes-feu.md
        - Armes à distance: equipement-distance.md
        - Explosifs: equipement-explosifs.md
        - Protections: equipement-protections.md
        - Boucliers: equipement-boucliers.md
  - Simulateur: simulateur.md
  - Générateur: generateur.md
