backend:
  name: github
  repo: BaDjams/ins-mv-rogue-srd
  branch: main

# Décommenter pour utiliser le backend local (dev uniquement, sans OAuth)
# local_backend: true

media_folder: public/images
public_folder: /ins-mv-rogue-srd/images

# Locale par défaut
locale: fr

collections:
  # ─── Pages libres (Accueil, SRD, Simulateur, Générateur) ───────────────────
  - name: pages
    label: Pages
    label_singular: Page
    folder: src/content/docs
    create: false
    delete: false
    filter: { field: "sidebar.order", value_type: number }
    fields:
      - { label: Titre, name: title, widget: string }
      - label: Sidebar
        name: sidebar
        widget: object
        fields:
          - { label: Ordre, name: order, widget: number, value_type: int }
          - { label: Étiquette (optionnel), name: label, widget: string, required: false }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Contenu, name: body, widget: markdown }

  # ─── Contexte ───────────────────────────────────────────────────────────────
  - name: contexte
    label: Contexte
    label_singular: Page de contexte
    folder: src/content/docs/contexte
    create: true
    delete: true
    fields:
      - { label: Titre, name: title, widget: string }
      - label: Sidebar
        name: sidebar
        widget: object
        fields:
          - { label: Ordre, name: order, widget: number, value_type: int }
          - { label: Étiquette (optionnel), name: label, widget: string, required: false }
      - { label: Contenu, name: body, widget: markdown }

