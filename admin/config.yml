      - label: Sidebar
        name: sidebar
        widget: object
        fields:
          - { label: Ordre, name: order, widget: number, value_type: int }
          - { label: Étiquette (optionnel), name: label, widget: string, required: false }
      - { label: Contenu, name: body, widget: markdown }

  # ─── Mécanique ───────────────────────────────────────────────────────────────
  - name: mecanique
    label: Mécanique
    label_singular: Page Mécanique
    folder: src/content/docs/mecanique
    create: true
    delete: true
    fields:
      - { label: Titre, name: title, widget: string }
      - label: Sidebar
        name: sidebar
        widget: object
        fields:
          - { label: Ordre, name: order, widget: number, value_type: int }
          - { label: Étiquette (optionnel), name: label, widget: string, required: false }
